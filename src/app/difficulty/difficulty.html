<div class="card main">
    <div class="center">
        <h2>Seleccione una categoria</h2>
    </div>
    <div class="center category">
        @for (category of categories; track category) {
            <div class="card category-card" (click)="setCategory(category)" routerLink="/game/">
                <span>{{category.name}}</span>
                <span>&nbsp;</span>
                <span>{{category.difficulty}}</span>
            </div>
        }
        @empty {
            <div class="center">
                <p>No hay categorias</p>
            </div>
        }
    </div>
</div>
