<div class="card main">
    @for (gameMatch of gamesMatches; track gameMatch) {
        <p>{{gameMatch.id}}</p>
        <p>{{gameMatch.category.name}}</p>
        <p>{{gameMatch.category.difficulty}}</p>
        <p>{{gameMatch.word}}</p>
        @if (gameMatch.won) {
            <p>Ganaste</p>
        }
        @else {
            <p>Perdiste</p>
        }

    }
    <button routerLink=""> Otra</button>
</div>
